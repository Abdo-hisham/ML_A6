name: ML Training Pipeline

on: [push]

jobs:

  # ── GATEKEEPER JOB ──────────────────────────────────────────────
  # Lightweight job that runs first (cheap, no GPU)
  # If this fails, train will never start
  linter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install flake8
        run: pip install flake8

      - name: Run Linter
        run: flake8 src/train.py

  # ── EXPENSIVE TRAINING JOB ──────────────────────────────────────
  # Three conditions must ALL be true:
  #   1. linter job passed      → needs: linter
  #   2. branch is main         → github.ref == 'refs/heads/main'
  #   3. commit message has tag → contains(github.event.head_commit.message, '[run-train]')
  train:
    needs: linter
    runs-on: ubuntu-latest
    if: |
      success() &&
      github.ref == 'refs/heads/main' &&
      contains(github.event.head_commit.message, '[run-train]')

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      # ── MAIN TRAINING STEP ──────────────────────────────────────
      - name: Run Training
        run: python src/train.py

      # ── ON FAILURE: upload error logs for debugging ─────────────
      - name: Upload Error Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: crash-report
          path: error_logs.txt

      # ── ALWAYS: cleanup step runs no matter what ─────────────────
      - name: Cleanup Temporary Cloud Volumes
        if: always()
        run: echo "Cleaning up temporary cloud volumes..."
